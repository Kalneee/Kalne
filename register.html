<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei";}
        a{text-decoration:none;color:#333;}
        .container{width:1200px;margin:0 auto;}
        .header{height:80px;line-height:80px;border-bottom:1px solid #eee;}
        .logo{float:left; display:flex; align-items:center; gap:15px;}
        .logo img{ height:60px; width: auto; }
        .logo h1{font-size:26px;color:#1677ff;}
        .login-reg{float:right;}
        .nav{background:#1677ff;height:50px;line-height:50px;}
        .nav ul{display:flex;gap:40px;list-style:none;}
        .nav a{color:white;font-size:18px;}
        .reg-box{width:500px;margin:50px auto;padding:40px;border:1px solid #eee;border-radius:12px;box-shadow:0 0 12px rgba(0,0,0,0.05);}
        .reg-box h2{margin-bottom:25px;text-align:center; color: #333;}
        input,textarea{width:100%;height:44px;padding:0 12px;border:1px solid #ddd;border-radius:6px;margin:8px 0;font-size:15px;}
        textarea{height:90px;resize:none;}
        .gender{
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 30px;
            padding-left: 5px;
        }
        .gender label{
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        .gender input[type="radio"]{
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }
        button{width:100%;height:46px;background:#1677ff;color:white;border:none;border-radius:6px;margin-top:15px;cursor:pointer;font-size:16px;}
        .tip{color:red;text-align:center;margin-top:10px;display:none;}
    </style>
</head>
<body>
<div class="header">
    <div class="container">
        <div class="logo">
            <img src="images/logo.png" alt="天明机械LOGO">
        </div>
        <div class="login-reg">
            <a href="login.html">登录</a> | <a href="register.html">注册</a>
        </div>
    </div>
</div>
<div class="nav">
    <div class="container">
        <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="about.html">公司简介</a></li>
            <li><a href="news.html">新闻中心</a></li>
            <li><a href="product.html">产品服务</a></li>
            <li><a href="download.html">下载中心</a></li>
            <li><a href="join.html">加入我们</a></li>
        </ul>
    </div>
</div>

<div class="reg-box">
    <h2>用户注册</h2>
    <form onsubmit="return reg()">
        <input id="user" placeholder="用户名">
        <div class="gender">
            <label>
                <input type="radio" name="sex" checked value="男">男
            </label>
            <label>
                <input type="radio" name="sex" value="女">女
            </label>
        </div>
        <input id="realname" placeholder="真实姓名">
        <input type="password" id="pwd" placeholder="密码（不少于6位）">
        <input type="password" id="repwd" placeholder="确认密码">
        <input id="phone" placeholder="手机号">
        <input id="email" placeholder="邮箱">
        <textarea id="intro" placeholder="个人简介"></textarea>
        <button type="submit">注册</button>
    </form>
    <div class="tip" id="tip"></div>
</div>
<script>
// 完整表单验证，所有字段都校验
function reg(){
    let user = document.getElementById("user").value.trim();
    let realname = document.getElementById("realname").value.trim();
    let pwd = document.getElementById("pwd").value.trim();
    let repwd = document.getElementById("repwd").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();
    let intro = document.getElementById("intro").value.trim();
    let tip = document.getElementById("tip");

    if(user == ""){tip.innerText="请输入用户名";tip.style.display="block";return false;}
    if(realname == ""){tip.innerText="请输入真实姓名";tip.style.display="block";return false;}
    if(pwd.length < 6){tip.innerText="密码至少6位";tip.style.display="block";return false;}
    if(pwd != repwd){tip.innerText="两次密码不一致";tip.style.display="block";return false;}
    if(phone.length != 11){tip.innerText="手机号必须11位";tip.style.display="block";return false;}
    if(email == ""){tip.innerText="请输入邮箱地址";tip.style.display="block";return false;}
    if(intro == ""){tip.innerText="请填写个人简介";tip.style.display="block";return false;}

    // 验证通过，跳转到登录页
    alert("注册成功！请登录");
    location.href = "login.html?reg=ok";
    return false;
}
</script>
</body>
</html>
